<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AeroWeather</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🌤️ AeroWeather</h1>

    <input id="searchBox" placeholder="Enter city">
    <button id="addBtn">Add City</button>

    <br><br>

    
    <input id="searchFilter" placeholder="Search in list">

    
    <select id="filter">
      <option value="all">All</option>
      <option value="hot">Hot (>25°C)</option>
      <option value="cold">Cold (<20°C)</option>
    </select>

    <select id="sort">
      <option value="">Sort</option>
      <option value="asc">Temp Low-High</option>
      <option value="desc">Temp High-Low</option>
      <option value="name">Name A-Z</option>
    </select>

    <button id="modeBtn">🌙 Mode</button>

    <p id="loading" class="load">Loading...</p>

    <div id="list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
